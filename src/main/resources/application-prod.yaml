spring:
  application:
    name: rapid-engine

  data:
    redis:
      # Upstash uses Redis 6+ ACL — the username is always "default".
      username: ${REDIS_USERNAME:default}
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:true}
      # Give Upstash time for the 3 way handshake since that can be slower
      timeout: ${REDIS_TIMEOUT:10000}

  rabbitmq:
    host: "${RABBITMQ_HOST:}"
    port: ${RABBITMQ_PORT:5672}
    username: "${RABBITMQ_USERNAME:}"
    password: "${RABBITMQ_PASSWORD:}"
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    ssl:
      # CloudAMQP: set RABBITMQ_SSL_ENABLED=true and RABBITMQ_PORT=5671 to use the
      # secure AMQPS endpoint. Defaults to plain AMQP (5672) when unset.
      enabled: ${RABBITMQ_SSL_ENABLED:false}

  kafka:
    bootstrap-servers: "${KAFKA_BOOTSTRAP_SERVERS:}"
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true

app:
  messaging:
    broker: "${MESSAGING_BROKER:}"

  rabbitmq:
    matches:
      exchange: "${RABBITMQ_MATCHES_EXCHANGE:}"
      queue: "${RABBITMQ_MATCHES_QUEUE:}"
      routing-key: "${RABBITMQ_MATCHES_ROUTING_KEY:}"
    results:
      exchange: "${RABBITMQ_RESULTS_EXCHANGE:}"
      queue: "${RABBITMQ_RESULTS_QUEUE:}"
      routing-key: "${RABBITMQ_RESULTS_ROUTING_KEY:}"

  kafka:
    matches:
      topic: "${KAFKA_MATCHES_TOPIC:}"
    results:
      topic: "${KAFKA_RESULTS_TOPIC:}"
    topic-defaults:
      partitions: ${KAFKA_TOPIC_PARTITIONS:1}
      replication-factor: ${KAFKA_TOPIC_REPLICATION_FACTOR:1}

  rundown-api:
    key: ${RUNDOWN_API_KEY}
    host: ${RUNDOWN_BASE_URL}
    sports-id: ${RUNDOWN_SPORT_IDS}
    affiliate-id: ${AFFILIATE_IDS}
    poll: ${POLL}
    delay: ${DELAY}

server:
  # Bare AWS EC2 VM: we control the port directly via APP_PORT (default 5002).
  port: ${APP_PORT:5002}

logging:
  config: classpath:rapid-engine-logback.xml
  level:
    root: INFO
    com.bixx.rapid_engine: ${LOGGING_LEVEL:INFO}
    org.apache.coyote: WARN
    org.springframework.jdbc: WARN
    org.springframework: WARN
