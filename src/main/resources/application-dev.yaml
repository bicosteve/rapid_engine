spring:
  application:
    name: rapid-engine

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}


  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /


app:
  rabbitmq:
    exchange: ${RABBITMQ_EXCHANGE}
    queue: ${RABBITMQ_QUEUE}
    routing-key: ${RABBITMQ_ROUTING_KEY}

  rundown-api:
    key: ${RUNDOWN_API_KEY}
    host: ${RUNDOWN_BASE_URL}
    sports-id: ${RUNDOWN_SPORT_ID}


server:
  port: ${APP_PORT}


logging:
  level:
    org.springframework.jdbc: ${LOGGING_LEVEL}