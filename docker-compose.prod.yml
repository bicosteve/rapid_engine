# Production compose for a single AWS EC2 VM.
#
# Unlike docker-compose.yml (local dev), this file:
# - runs the already-built image (no local build, no source bind mounts)
# - assumes Redis and the selected messaging broker are MANAGED/REMOTE.
# Redis, RabbitMQ, and Kafka are externally managed and not provisioned here.
# Set MESSAGING_BROKER and the selected broker's connection variables in
# the external env file (including KAFKA_BOOTSTRAP_SERVERS for Kafka).
# - adds a Grafana Alloy agent that tails the app container's stdout and
# ships the JSON logs to Grafana Cloud Loki (free tier)
#
# Usage on the VM:
# export IMAGE=ghcr.io/<owner>/rapid-engine:latest
# export APP_ENV_FILE="$HOME/rapid-engine/.env.prod"
# docker compose -f docker-compose.prod.yml --env-file "$APP_ENV_FILE" up -d

services:
  rapid-engine:
    image: ${IMAGE:-rapid-engine:latest}
    container_name: rapid-engine
    env_file:
      - "${APP_ENV_FILE:?Set APP_ENV_FILE to the production environment file}"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "${APP_PORT:-5002}:${APP_PORT:-5002}"
    restart: unless-stopped
    # JSON logs go to stdout; Docker's json-file driver captures them and Alloy
    # reads them from the Docker socket. Rotate so the host disk never fills up.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - rapid-engine-net

  # Grafana Alloy — the official Grafana Cloud agent (replaces Promtail).
  # It discovers Docker containers, reads their stdout, and pushes to Loki.
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    env_file:
      - "${APP_ENV_FILE:?Set APP_ENV_FILE to the production environment file}"
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      # Read container logs + metadata from the Docker engine.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - rapid-engine-net

networks:
  rapid-engine-net:
    driver: bridge
