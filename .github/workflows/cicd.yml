# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Test, Validate, Build, Publish, and Deploy

on:
  push:
    branches:
      - 'feat/*'
      - 'fix/*'
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Xmx1024m'
  DOCKER_IMAGE: bixoloo/rapid-engine

jobs:
  # STAGE::01 Tests (run unit tests, enforce pass-rate gate)
  test:
    name: Stage 1::Run unittests
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        run: ./mvnw -B test

      - name: Validate test pass-rate (>= 99%)
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          REPORT_DIR="target/surefire-reports"
          if [ ! -d "$REPORT_DIR" ]; then
            echo "::error::No surefire report directory found at $REPORT_DIR"
            exit 1
          fi

          # Aggregate counters from every TEST-*.xml surefire report
          TOTAL=0
          FAILURES=0
          ERRORS=0
          SKIPPED=0
          for f in "$REPORT_DIR"/TEST-*.xml; do
            [ -f "$f" ] || continue
            TOTAL=$(( TOTAL + $(grep -oP 'tests="\K[0-9]+' "$f" | head -n1 || echo 0)))
            FAILURES=$(( FAILURES + $(grep -oP 'failures="\K[0-9]+' "$f" | head -n1 || echo 0)))
            ERRORS=$(( ERRORS + $(grep -oP 'errors="\K[0-9]+' "$f" | head -n1 || echo 0)))
            SKIPPED=$(( SKIPPED + $(grep -oP 'skipped="\K[0-9]+' "$f" | head -n1 || echo 0)))
          done

          PASSED=$((TOTAL - FAILURES - ERRORS - SKIPPED))
          if [ "$TOTAL" -le 0 ]; then
            echo "::error::No tests were executed — failing the build."
            exit 1
          fi

          # bash integer arithmetic; multiply by 10000 for two-decimal precision
          RATE=$(( (PASSED * 10000) / TOTAL ))
          RATE_INT=$(( RATE / 100 ))
          RATE_DEC=$(( RATE % 100 ))

          echo "=========================================="
          echo "Test results summary"
          echo "=========================================="
          echo "Total : ${TOTAL}"
          echo "Passed : ${PASSED}"
          echo "Failures : ${FAILURES}"
          echo "Errors : ${ERRORS}"
          echo "Skipped : ${SKIPPED}"
          echo "Pass rate : ${RATE_INT}.${RATE_DEC}% (gate: 99%)"
          echo "=========================================="

          THRESHOLD=85
          if [ "$RATE_INT" -lt "$THRESHOLD" ]; then
            echo "::error::Pass rate ${RATE_INT}.${RATE_DEC}% is below the required ${THRESHOLD}% gate."
            exit 1
          fi
          echo "Pass rate ${RATE_INT}.${RATE_DEC}% meets the ${THRESHOLD}% gate."

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          retention-days: 1

  # STAGE::02 Build (package the application jar)
  build:
    name: Stage 2::Build the app jar file
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build the application
        run: ./mvnw -B -DskipTests package

      - name: List built artifacts
        shell: bash
        run: |
          echo "Built artifacts:"
          ls -la target/*.jar

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: rapid-engine-jar
          path: target/*.jar
          retention-days: 1

  # STAGE::03 Docker Build Image on MAIN branch PUSH ONLY
  docker-build:
    name: Stage 3::Build the application image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/rapid-engine-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: rapid-engine-image
          path: /tmp/rapid-engine-image.tar
          retention-days: 1

  # Stage 4::Push the image to Docker Hub
  docker-push:
    name: Stage 4::Push the image to Docker Hub
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: rapid-engine-image
          path: /tmp

      - name: Load image into Docker
        run: docker load --input /tmp/rapid-engine-image.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push image to Docker Hub
        shell: bash
        run: |
          set -euo pipefail
          SHA_TAG="${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
          LATEST_TAG="${{ env.DOCKER_IMAGE }}:latest"

          echo "Pushing ${SHA_TAG}"
          docker push "${SHA_TAG}"

          echo "Tagging and pushing ${LATEST_TAG}"
          docker tag "${SHA_TAG}" "${LATEST_TAG}"
          docker push "${LATEST_TAG}"

          echo "Successfully pushed:"
          echo " - ${SHA_TAG}"
          echo " - ${LATEST_TAG}"

  deploy:
    name: Load the image to the VM and deploy
    runs-on: ubuntu-latest
    # Manual dispatch on main deploys the existing :latest image only.
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Copy the prod compose file and the Alloy config to the VM so the box
      # always runs exactly what's in the repo (no manual drift).
      - name: Copy deployment files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          source: "docker-compose.prod.yml,alloy/config.alloy"
          target: "~/rapid-engine"

      # Pull the already-published :latest image from Docker Hub and restart
      # the stack. ~/rapid-engine/.env.prod must already exist on the VM (it holds
      # all secrets and is NEVER committed to the repo).
      - name: Pull image and restart stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ~/rapid-engine
            export IMAGE="${{ env.DOCKER_IMAGE }}:latest"
            export APP_ENV_FILE="$HOME/rapid-engine/.env.prod"
            test -f "$APP_ENV_FILE"

            echo "Pulling the latest image from Docker Hub..."
            docker compose -f docker-compose.prod.yml --env-file "$APP_ENV_FILE" pull

            echo "Starting/recreating the application stack..."
            docker compose -f docker-compose.prod.yml \
              --env-file "$APP_ENV_FILE" up -d --remove-orphans

            echo "Cleaning up unused Docker images..."
            docker image prune -f

            echo "Current running containers:"
            docker compose -f docker-compose.prod.yml --env-file "$APP_ENV_FILE" ps
