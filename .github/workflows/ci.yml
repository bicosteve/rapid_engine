name: Workflow for testing, validating, building, publishing, and deployment

on:
  push:
    branches:
      - feat/*
      - fix/*
  pull_request:
    branches:
      - main
      - dev

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Xmx1024m'

jobs:
  # STAGE::01 Tests (run unit tests, enforce 85% pass-rate gate)
  test:
    name: Stage 1 — Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        run: ./mvnw -B test

      - name: Validate test pass-rate (>= 85%)
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          REPORT_DIR="target/surefire-reports"
          if [ ! -d "$REPORT_DIR" ]; then
            echo "::error::No surefire report directory found at $REPORT_DIR"
            exit 1
          fi

          # Aggregate counters from every TEST-*.xml surefire report
          TOTAL=0
          FAILURES=0
          ERRORS=0
          SKIPPED=0
          for f in "$REPORT_DIR"/TEST-*.xml; do
            [ -f "$f" ] || continue
            TOTAL=$((    TOTAL    + $(grep -oP 'tests="\K[0-9]+'    "$f" | head -n1 || echo 0)))
            FAILURES=$(( FAILURES + $(grep -oP 'failures="\K[0-9]+' "$f" | head -n1 || echo 0)))
            ERRORS=$((   ERRORS   + $(grep -oP 'errors="\K[0-9]+'   "$f" | head -n1 || echo 0)))
            SKIPPED=$((  SKIPPED  + $(grep -oP 'skipped="\K[0-9]+'  "$f" | head -n1 || echo 0)))
          done

          PASSED=$((TOTAL - FAILURES - ERRORS - SKIPPED))
          if [ "$TOTAL" -le 0 ]; then
            echo "::error::No tests were executed — failing the build."
            exit 1
          fi

          # bash integer arithmetic; multiply by 10000 for two-decimal precision
          RATE=$(( (PASSED * 10000) / TOTAL ))
          RATE_INT=$(( RATE / 100 ))
          RATE_DEC=$(( RATE % 100 ))

          echo "=========================================="
          echo "Test results summary"
          echo "=========================================="
          echo "Total     : ${TOTAL}"
          echo "Passed    : ${PASSED}"
          echo "Failures  : ${FAILURES}"
          echo "Errors    : ${ERRORS}"
          echo "Skipped   : ${SKIPPED}"
          echo "Pass rate : ${RATE_INT}.${RATE_DEC}%  (gate: 85%)"
          echo "=========================================="

          THRESHOLD=85
          if [ "$RATE_INT" -lt "$THRESHOLD" ]; then
            echo "::error::Pass rate ${RATE_INT}.${RATE_DEC}% is below the required ${THRESHOLD}% gate."
            exit 1
          fi
          echo "✅ Pass rate ${RATE_INT}.${RATE_DEC}% meets the ${THRESHOLD}% gate."

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          retention-days: 7

  # STAGE::02 Build (package the application jar)
  build:
    name: Stage 2 — Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build the application
        run: ./mvnw -B -DskipTests package

      - name: List built artifacts
        shell: bash
        run: |
          echo "Built artifacts:"
          ls -la target/*.jar

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: rapid-engine-jar
          path: target/*.jar
          retention-days: 14

  # STAGE::03 Docker (placeholder for continuous delivery)
  docker:
    name: Stage 3 — Docker (CD placeholder)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Download built jar
        uses: actions/download-artifact@v4
        with:
          name: rapid-engine-jar
          path: target

      - name: Docker CD placeholder
        shell: bash
        run: |
          echo "----------------------------------------------"
          echo " Docker Continuous Delivery Placeholder"
          echo "----------------------------------------------"
          echo ""
          echo "The Docker build/push step is intentionally a placeholder for now."
          echo ""
          echo "When enabled, this stage will typically:"
          echo "  1. Log in to a container registry (docker/login-action)"
          echo "  2. Build the image (docker/build-push-action) using the downloaded jar"
          echo "     or a multi-stage Dockerfile that runs 'mvn -B -DskipTests package'"
          echo "  3. Tag the image (e.g. ghcr.io/<org>/rapid-engine:<sha>)"
          echo "  4. Push the image to the registry"
          echo "  5. Trigger a downstream deploy (kubectl rollout, ECS update, etc.)"
          echo ""
          echo "For now, printing the artifact path that WOULD be packaged:"
          ls -la target/*.jar 2>/dev/null || echo "(no jar in target/)"
          echo ""
          echo "Docker stage placeholder finished successfully."
